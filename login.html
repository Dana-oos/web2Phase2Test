<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Nourish</title>

  <link rel="stylesheet" href="styleMuniera.css">
  <link rel="stylesheet" href="stylesheet.css">


  <style>

    /* Center container */

    .form-container {
      min-height: 70vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Form box */

    .form-box {
      background-color: #F5F5DC;
      max-width: 600px;
      width: 100%;
      padding: 45px 50px;
      border-radius: 20px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    }

    .form-box h2 {
      text-align: center;
      color: #556B2F;
      margin-bottom: 30px;
      font-size: 1.9rem;
    }

    /* Labels */

    .form-box label {
      font-weight: 600;
      margin-top: 18px;
      display: block;
      color: #444;
      font-size: 15px;
    }

    /* Inputs */

    .form-box input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 10px;
      border: 1px solid #bbb;
      font-size: 15px;
    }

    .form-box input:focus {
      outline: none;
      border-color: #6B8E23;
      box-shadow: 0 0 4px rgba(107,142,35,0.4);
    }

    /* Button */

    .form-box button {
      width: 100%;
      margin-top: 25px;
      padding: 14px;
      background-color: #556B2F;
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .form-box button:hover {
      background-color: #6B8E23;
      transform: translateY(-2px);
    }

   

    .form-links {
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
    }

    .form-links a {
      color: #556B2F;
      text-decoration: none;
      font-weight: 600;
    }

    .form-links a:hover {
      text-decoration: underline;
    }
    
    .error-message{
  color:#b30000;
  background:#ffe6e6;
  padding:10px;
  border-radius:8px;
  text-align:center;
  margin-bottom:15px;
  font-weight:bold;
}

  </style>
</head>

<body>

 
  <header class="site-header">
    <div class="container nav">

      <div class="logo-area">
	  <a href="index.html">
        <img src="logoremoved.png" alt="Nourish logo"></a>
        <p id="VMstatement"><em>Healthy never tasted this fun...</em></p>
      </div>

    </div>
  </header>

  <!-- Login Form -->

  <div class="form-container">

    <div class="form-box">

      <h2>Log In</h2>
      
<div id="error-message" class="error-message" style="display:none;"></div>
    
      <!-- changed the action -->
      <form action="login.php" method="post" onsubmit="this.querySelector('button').disabled=true;">

        <label for="email">Email</label>
        <input type="email" id="email" name="emailAddress" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>


		<div class="login-buttons">
                    <!--deleted formAction -->
        <button type="submit" >Log In</button>
		
		 <!--<button type="submit" formaction="user.html">Log In as User</button> -->
		</div>

      </form>

      <div class="form-links">
        <p>Don’t have an account?
          <a href="signup.html">Sign Up</a>
        </p>
      </div>

    </div>

  </div>

  <!-- Footer -->

  <footer class="site-footer">
    <div class="footer-container">

      <div class="footer-left">
        <h3>Contact Us</h3>
        <p>📞 +966 565212266</p>
        <p>✉️ info@Nourish.com</p>
      </div>

      <div class="footer-center">
        <p>© 2026 Nourish All Rights Reserved.</p>
      </div>

      <div class="footer-right">
        <h3>Follow Us</h3>

        <div class="social-icons">
          <a href="#"><img src="instagram.png"></a>
          <a href="#"><img src="X.png"></a>
          <a href="#"><img src="facebook.png"></a>
        </div>

      </div>

    </div>
  </footer>
  
<script>
  const params = new URLSearchParams(window.location.search);
  const error = params.get("error");
  const errorBox = document.getElementById("error-message");

  if (error === "blocked") {
    errorBox.textContent = "This email is a blocked one.";
    errorBox.style.display = "block";
  } 
  else if (error === "invalid") {
    errorBox.textContent = "The entered email/password is not correct.";
    errorBox.style.display = "block";
  }
</script>

</body>
</html>
